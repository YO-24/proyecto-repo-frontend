<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">Mi WebApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio (DataTables)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="formulario.html">Nuevo Usuario</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container main-container bg-white p-4 rounded shadow-sm">
        <h2 class="mb-4 text-primary">Registrar Nuevo Usuario</h2>
        
        <form id="registroForm" novalidate>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="txtNombre" class="form-label">Nombre Completo *</label>
                    <input type="text" class="form-control" id="txtNombre" required>
                    <div class="invalid-feedback">El nombre es obligatorio.</div>
                </div>
                <div class="col-md-6">
                    <label for="txtUsuario" class="form-label">Usuario *</label>
                    <input type="text" class="form-control" id="txtUsuario" required>
                    <div class="invalid-feedback">El usuario es obligatorio.</div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="txtFecha" class="form-label">Fecha de Ingreso *</label>
                    <input type="date" class="form-control" id="txtFecha" required>
                    <div class="invalid-feedback">Ingrese una fecha válida.</div>
                </div>
                <div class="col-md-6">
                    <label for="txtEmail" class="form-label">Correo Electrónico *</label>
                    <input type="email" class="form-control" id="txtEmail" placeholder="usuario@servidor.dom" required>
                    <div class="invalid-feedback">El formato debe ser usuario@servidor.dom.</div>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-12">
                    <label for="txtSitio" class="form-label">Sitio Web</label>
                    <input type="url" class="form-control" id="txtSitio" placeholder="https://www.ejemplo.com">
                    <div class="invalid-feedback">Ingrese una URL válida (opcional).</div>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary" id="btnCancelar">Cancelar</button>
                <button type="submit" class="btn btn-primary" id="btnEnviar">Enviar</button>
            </div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
